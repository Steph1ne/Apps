<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relations</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0e0e10;
  color: #e8e8f0;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  min-height: 100vh;
}

header {
  padding: 16px 20px;
  border-bottom: 1px solid #2a2a35;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}

.brand {
  font-family: Georgia, serif;
  font-size: 20px;
  color: #e8e8f0;
}
.brand span { color: #c77dff; }

.tabs { display: flex; gap: 4px; }
.tab {
  padding: 6px 12px;
  border: 1px solid #2a2a35;
  background: transparent;
  color: #a0a0b8;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  cursor: pointer;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.tab.active { background: #c77dff; border-color: #c77dff; color: #fff; }

main { padding: 20px; max-width: 860px; margin: 0 auto; }

.view { display: none; }
.view.active { display: block; }

/* PROGRESS */
.prog-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
.prog-label { color: #6b6b80; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
.prog-bar { background: #2a2a35; height: 3px; border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, #e8a838, #c77dff); transition: width 0.4s; }

/* STEPS */
.steps { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; border: 1px solid #2a2a35; background: transparent; }
.step-dot.active { background: #e8a838; border-color: #e8a838; }
.step-dot.done { background: #4ea8de; border-color: #4ea8de; }

/* DIM TITLE */
.dim-title { text-align: center; margin-bottom: 24px; }
.dim-title h2 { font-family: Georgia, serif; font-size: 28px; font-weight: 400; }
.dim-title p { color: #6b6b80; font-size: 11px; margin-top: 4px; }

/* DUEL */
.duel { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; margin-bottom: 16px; }
.choice-btn {
  background: #16161a;
  border: 1px solid #2a2a35;
  border-radius: 10px;
  padding: 24px 16px;
  cursor: pointer;
  color: #e8e8f0;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  text-align: center;
  width: 100%;
  transition: all 0.15s;
}
.choice-btn:hover { border-color: #e8a838; background: #1e1e24; }
.choice-btn.prob:hover { border-color: #4ea8de; }
.vs { width: 32px; height: 32px; border: 1px solid #2a2a35; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #6b6b80; font-size: 10px; letter-spacing: 1px; }

/* EGALITE */
.tie-btn {
  display: block;
  margin: 0 auto 14px;
  background: transparent;
  border: 1px dashed #2a2a35;
  color: #6b6b80;
  padding: 6px 16px;
  border-radius: 6px;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  cursor: pointer;
}
.tie-btn:hover { border-color: #a0a0b8; color: #e8e8f0; }

/* SEL BOX */
.sel-box {
  background: #1e1e24;
  border: 1px solid #2a2a35;
  border-radius: 8px;
  padding: 10px 16px;
  margin-bottom: 14px;
  display: flex;
  gap: 20px;
  align-items: center;
  flex-wrap: wrap;
}
.sel-item { display: flex; gap: 6px; align-items: center; }
.sel-label { color: #6b6b80; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
.sel-val-e { color: #e8a838; font-size: 13px; }
.sel-val-p { color: #4ea8de; font-size: 13px; }
.sel-val-empty { color: #2a2a35; font-size: 13px; }

/* ACTIONS */
.action-row { display: flex; gap: 10px; justify-content: center; margin-top: 4px; }
.btn-ghost {
  padding: 10px 22px;
  border-radius: 6px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid #2a2a35;
  background: transparent;
  color: #6b6b80;
}
.btn-ghost:hover { color: #e8e8f0; border-color: #a0a0b8; }

/* DONE PANEL */
.done-panel {
  background: #16161a;
  border: 1px solid #2a2a35;
  border-radius: 10px;
  padding: 40px 20px;
  text-align: center;
}
.done-panel h2 { font-family: Georgia, serif; font-size: 22px; font-weight: 400; margin-bottom: 10px; }
.done-panel p { color: #6b6b80; font-size: 12px; margin-bottom: 20px; }
.btn-primary {
  padding: 10px 22px;
  border-radius: 6px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid #c77dff;
  background: #c77dff;
  color: #fff;
}

/* STATS BAR */
.stats-bar {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  padding: 14px 18px;
  background: #16161a;
  border: 1px solid #2a2a35;
  border-radius: 8px;
  margin-bottom: 18px;
}
.stat-val { font-family: Georgia, serif; font-size: 20px; display: block; }
.stat-lab { font-size: 10px; color: #6b6b80; text-transform: uppercase; letter-spacing: 1px; }

/* RANKINGS GRID */
.rank-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
.rank-card { background: #16161a; border: 1px solid #2a2a35; border-radius: 10px; overflow: hidden; }
.rank-card-head { padding: 12px 14px; border-bottom: 1px solid #2a2a35; display: flex; align-items: center; gap: 8px; }
.rank-card-title { font-family: Georgia, serif; font-size: 14px; font-weight: 400; }
.rank-card-sub { font-size: 10px; color: #6b6b80; margin-top: 1px; }
.rank-item { display: flex; align-items: center; gap: 8px; padding: 7px 14px; border-bottom: 1px solid #1a1a20; }
.rank-item:last-child { border-bottom: none; }
.rank-num { font-size: 10px; color: #6b6b80; width: 18px; text-align: right; flex-shrink: 0; }
.rank-name { flex: 1; font-size: 12px; }
.rank-score { font-size: 11px; }

/* MANAGE */
.add-form { background: #16161a; border: 1px solid #2a2a35; border-radius: 10px; padding: 20px; max-width: 460px; margin-bottom: 16px; }
.add-form h2 { font-family: Georgia, serif; font-size: 18px; font-weight: 400; margin-bottom: 4px; }
.add-form p { color: #6b6b80; font-size: 11px; margin-bottom: 16px; }
.field label { display: block; font-size: 10px; color: #6b6b80; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.field input {
  width: 100%;
  background: #1e1e24;
  border: 1px solid #2a2a35;
  border-radius: 6px;
  padding: 9px 12px;
  color: #e8e8f0;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  outline: none;
  margin-bottom: 12px;
}
.field input:focus { border-color: #c77dff; }

.person-list { background: #16161a; border: 1px solid #2a2a35; border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
.person-list-head { padding: 10px 14px; border-bottom: 1px solid #2a2a35; font-size: 10px; color: #6b6b80; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; }
.person-row { display: flex; align-items: center; gap: 8px; padding: 9px 14px; border-bottom: 1px solid #1a1a20; }
.person-row:last-child { border-bottom: none; }
.person-row.editing { background: #1e1e24; }
.person-name { flex: 1; font-size: 13px; }
.person-comps { font-size: 10px; color: #6b6b80; }
.icon-btn { background: transparent; border: none; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 3px; font-family: inherit; }
.edit-input { flex: 1; background: #0e0e10; border: 1px solid #4ea8de; border-radius: 5px; padding: 5px 10px; color: #e8e8f0; font-family: 'Courier New', monospace; font-size: 13px; outline: none; }
.btn-save { background: #4ea8de; border: none; color: #fff; padding: 5px 12px; border-radius: 5px; font-family: 'Courier New', monospace; font-size: 11px; cursor: pointer; }
.btn-cancel-sm { background: transparent; border: 1px solid #2a2a35; color: #6b6b80; padding: 5px 10px; border-radius: 5px; font-family: 'Courier New', monospace; font-size: 11px; cursor: pointer; }

.reset-zone { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 16px; background: #16161a; border: 1px solid #2a2a35; border-radius: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.reset-zone p { color: #6b6b80; font-size: 11px; flex: 1; }
.btn-danger { background: transparent; border: 1px solid rgba(255,107,107,0.4); color: #ff6b6b; padding: 7px 14px; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 11px; cursor: pointer; }

.backup-zone { background: #16161a; border: 1px solid #2a2a35; border-radius: 8px; overflow: hidden; margin-bottom: 14px; }
.backup-head { padding: 10px 14px; border-bottom: 1px solid #2a2a35; font-size: 10px; color: #6b6b80; text-transform: uppercase; letter-spacing: 1px; }
.backup-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.backup-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.backup-row p { color: #6b6b80; font-size: 11px; flex: 1; }
.btn-export { background: transparent; border: 1px solid #4ea8de; color: #4ea8de; padding: 7px 14px; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 11px; cursor: pointer; white-space: nowrap; }
.btn-import-label { background: transparent; border: 1px solid #e8a838; color: #e8a838; padding: 7px 14px; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 11px; cursor: pointer; white-space: nowrap; display: inline-block; }
#import-file { display: none; }

.flash { position: fixed; bottom: 20px; right: 20px; background: #56cf85; color: #0e0e10; padding: 10px 16px; border-radius: 6px; font-size: 12px; display: none; z-index: 999; }
.rel-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 500; margin-left: 4px; vertical-align: middle; }
.rel-high { background: rgba(86,207,133,0.15); color: #56cf85; }
.rel-mid  { background: rgba(232,168,56,0.15);  color: #e8a838; }
.rel-low  { background: rgba(255,107,107,0.15); color: #ff6b6b; }
</style>
</head>
<body>

<header>
  <div class="brand">Relations<span>.</span></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('compare', this)">Comparer</button>
    <button class="tab" onclick="switchTab('rankings', this)">Classements</button>
    <button class="tab" onclick="switchTab('manage', this)">Gérer</button>
  </div>
</header>

<main>
  <div id="view-compare" class="view active"><div id="compare-content"></div></div>
  <div id="view-rankings" class="view"><div id="rankings-content"></div></div>
  <div id="view-manage" class="view">
    <div class="add-form">
      <h2>Ajouter une personne</h2>
      <p>Elle sera intégrée dans les prochaines comparaisons.</p>
      <div class="field">
        <label>Prénom / Nom</label>
        <input type="text" id="new-name" placeholder="ex. Sophie M." onkeydown="if(event.key==='Enter')addPerson()">
      </div>
      <button class="btn-primary" onclick="addPerson()">Ajouter</button>
    </div>
    <div class="person-list" id="person-list"></div>
    <div class="reset-zone">
      <p>Réinitialiser tous les scores (les noms sont conservés).</p>
      <button class="btn-danger" onclick="resetScores()">Réinitialiser</button>
    </div>
    <div class="backup-zone">
      <div class="backup-head">Sauvegarde JSON</div>
      <div class="backup-body">
        <div class="backup-row">
          <p>Exporte toutes tes données dans un fichier JSON.</p>
          <button class="btn-export" onclick="exportJSON()">↓ Exporter</button>
        </div>
        <div class="backup-row">
          <p>Restaure une sauvegarde. Les données actuelles seront remplacées.</p>
          <label class="btn-import-label" for="import-file">↑ Importer</label>
          <input type="file" id="import-file" accept=".json" onchange="importJSON(event)">
        </div>
      </div>
    </div>
  </div>
</main>

<div class="flash" id="flash"></div>

<script>
// ======== DONNÉES PAR DÉFAUT ========
const DEFAULT_PEOPLE = [
  "Sophie L.","Sylvie","Mariam","Léa","Céline J.","Peggy M.",
  "Martine B.","Magali B.","Servane","Nathalie","Mélanie A.","Vanessa",
  "Florence G.","Élise","Euratechnologies","Manon","Bernadette","Maelle",
  "Manon G.","Loan","Renée","Catherine J.","Martine J.","Eva R.",
  "Souaad","Marine","Aline C.","Coralie L.","Agathe G.","Nadine P.",
  "Mathilde E.","Jenny","Julie V.","Charleen","Sarah","Émilie M.",
  "Coralie J.","Livia","Titia","LN","Lisa","Nadège","Mélanie G.","Sophie D.",
  "Sandrine D.","Elodie B.","Marie D.","Aline","Sophie C.",
  "Camille R.","Sabrina L.","Aurore X.","Muriel","Justine"
];

let _idCounter = Date.now();
function makeId() { return 'p' + (++_idCounter); }

function defaultState() {
  return {
    people: DEFAULT_PEOPLE.map(name => ({ id: makeId(), name })),
    scores: {},
    comparisons: {}
  };
}

// ======== STORAGE ========
const KEY = 'relations_v3';

function saveData() {
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {}
}

function loadData() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.people && parsed.people.length > 0) {
        const needsMigration = parsed.people.some(p => !p.id || !p.id.startsWith('p'));
        if (needsMigration) {
          return { people: parsed.people.map(p => ({ id: makeId(), name: p.name })), scores: {}, comparisons: {} };
        }
        return parsed;
      }
    }
  } catch(e) {}
  return defaultState();
}

let state = loadData();

// ======== UTILS ========
function getName(id) {
  const p = state.people.find(p => p.id === id);
  return p ? p.name : id;
}

function getWinRate(id, dim) {
  const s = state.scores[id];
  if (!s) return 0;
  const count = s[dim + '_count'] || 0;
  return count === 0 ? 0 : (s[dim] || 0) / count;
}

function getPriority(id) {
  return getWinRate(id, 'envie') * getWinRate(id, 'prob');
}

function getTotalPairs() {
  const n = state.people.length;
  return n * (n - 1) / 2;
}

function getDonePairs() {
  return Object.keys(state.comparisons).length;
}

function getPendingPairs() {
  const ids = state.people.map(p => p.id);
  const pairs = [];
  for (let i = 0; i < ids.length; i++) {
    for (let j = i + 1; j < ids.length; j++) {
      const k = ids[i] + '|' + ids[j];
      const r = ids[j] + '|' + ids[i];
      if (!state.comparisons[k] && !state.comparisons[r]) pairs.push([ids[i], ids[j]]);
    }
  }
  for (let i = pairs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
  }
  return pairs;
}

function ensureScore(id) {
  if (!state.scores[id]) state.scores[id] = { envie: 0, prob: 0, envie_count: 0, prob_count: 0 };
}

function recordComparison(id1, id2, envieW, probW) {
  state.comparisons[id1 + '|' + id2] = { envie: envieW, prob: probW };
  ensureScore(id1); ensureScore(id2);
  if (envieW === id1) state.scores[id1].envie += 1;
  else if (envieW === id2) state.scores[id2].envie += 1;
  else { state.scores[id1].envie += 0.5; state.scores[id2].envie += 0.5; }
  state.scores[id1].envie_count++; state.scores[id2].envie_count++;
  if (probW === id1) state.scores[id1].prob += 1;
  else if (probW === id2) state.scores[id2].prob += 1;
  else { state.scores[id1].prob += 0.5; state.scores[id2].prob += 0.5; }
  state.scores[id1].prob_count++; state.scores[id2].prob_count++;
  saveData();
}

function showFlash(msg) {
  const el = document.getElementById('flash');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2000);
}

// ======== NAVIGATION ========
function switchTab(view, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  btn.classList.add('active');
  if (view === 'compare') renderCompare();
  if (view === 'rankings') renderRankings();
  if (view === 'manage') renderManage();
}

// ======== COMPARE ========
let sessionPairs = [];
let sessionIdx = 0;
let currentEnvie = null;

function initSession() {
  sessionPairs = getPendingPairs().slice(0, 10);
  sessionIdx = 0;
  currentEnvie = null;
}

function renderCompare() {
  const el = document.getElementById('compare-content');
  const total = getTotalPairs();
  const done = getDonePairs();
  const pct = total > 0 ? Math.round(done / total * 100) : 100;

  if (sessionPairs.length === 0 || sessionIdx >= sessionPairs.length) {
    initSession();
  }

  const pair = sessionPairs[sessionIdx];

  if (!pair) {
    el.innerHTML = `<div class="done-panel">
      <h2>Toutes les comparaisons sont faites ✓</h2>
      <p>${done} paires évaluées sur ${total}.</p>
      <button class="btn-primary" onclick="switchTab('rankings', document.querySelectorAll('.tab')[1])">Voir les classements</button>
    </div>`;
    return;
  }

  const [id1, id2] = pair;
  const step = currentEnvie ? 'prob' : 'envie';

  el.innerHTML = `
    <div class="prog-row">
      <span class="prog-label">Comparaison ${sessionIdx + 1} / ${sessionPairs.length}</span>
      <span class="prog-label">${done} / ${total} (${pct}%)</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>

    <div class="steps">
      <div class="step-dot ${!currentEnvie ? 'active' : 'done'}"></div>
      <div class="step-dot ${currentEnvie ? 'active' : ''}"></div>
    </div>

    <div class="dim-title">
      ${!currentEnvie
        ? `<h2 style="color:#e8a838">Envie</h2><p>Avec qui as-tu le plus envie d'interagir ?</p>`
        : `<h2 style="color:#4ea8de">Probabilité</h2><p>Avec qui est-ce le plus réaliste ?</p>`
      }
    </div>

    <div class="duel">
      <button class="choice-btn ${step}" onclick="choose('${id1}')">${getName(id1)}</button>
      <div class="vs">VS</div>
      <button class="choice-btn ${step}" onclick="choose('${id2}')">${getName(id2)}</button>
    </div>

    <button class="tie-btn" onclick="chooseTie()">Égalité</button>

    ${currentEnvie ? `
    <div class="sel-box">
      <div class="sel-item">
        <span class="sel-label">Envie :</span>
        <span class="sel-val-e">${currentEnvie === 'tie' ? '= Égalité' : getName(currentEnvie)} ✓</span>
      </div>
      <div class="sel-item">
        <span class="sel-label">Probabilité :</span>
        <span class="sel-val-empty">— à choisir</span>
      </div>
    </div>` : ''}

    <div class="action-row">
      <button class="btn-ghost" onclick="skipPair()">Passer</button>
    </div>
  `;
}

function choose(id) {
  if (!currentEnvie) {
    currentEnvie = id;
    renderCompare();
  } else {
    validate(currentEnvie, id);
  }
}

function chooseTie() {
  if (!currentEnvie) {
    currentEnvie = 'tie';
    renderCompare();
  } else {
    validate(currentEnvie, 'tie');
  }
}

function validate(envieW, probW) {
  const pair = sessionPairs[sessionIdx];
  recordComparison(pair[0], pair[1], envieW, probW);
  currentEnvie = null;
  sessionIdx++;
  if (sessionIdx >= sessionPairs.length) {
    sessionPairs = getPendingPairs().slice(0, 10);
    sessionIdx = 0;
  }
  renderCompare();
}

function skipPair() {
  currentEnvie = null;
  sessionIdx++;
  if (sessionIdx >= sessionPairs.length) {
    sessionPairs = getPendingPairs().slice(0, 10);
    sessionIdx = 0;
  }
  renderCompare();
}

// ======== RANKINGS ========
function renderRankings() {
  const el = document.getElementById('rankings-content');
  const total = getTotalPairs();
  const done = getDonePairs();
  const n = state.people.length;

  const byEnvie = [...state.people].sort((a, b) => getWinRate(b.id, 'envie') - getWinRate(a.id, 'envie'));
  const byProb  = [...state.people].sort((a, b) => getWinRate(b.id, 'prob')  - getWinRate(a.id, 'prob'));
  const byPri   = [...state.people].sort((a, b) => getPriority(b.id) - getPriority(a.id));

  function makeList(sorted, dim, color) {
    const maxComps = Math.max(...sorted.map(p => state.scores[p.id] ? (state.scores[p.id].envie_count || 0) : 0), 1);
    return sorted.map((p, i) => {
      const val = dim === 'pri' ? getPriority(p.id) : getWinRate(p.id, dim);
      const comps = state.scores[p.id] ? (state.scores[p.id].envie_count || 0) : 0;
      const ratio = comps / (state.people.length - 1);
      const relClass = ratio >= 0.5 ? 'rel-high' : ratio >= 0.2 ? 'rel-mid' : 'rel-low';
      const relLabel = ratio >= 0.5 ? '●●●' : ratio >= 0.2 ? '●●○' : '●○○';
      return `<div class="rank-item">
        <span class="rank-num">${i + 1}</span>
        <span class="rank-name">${p.name}<span class="rel-badge ${relClass}" title="${comps} comparaisons">${relLabel}</span></span>
        <span class="rank-score" style="color:${color}">${(val * 100).toFixed(0)}%</span>
      </div>`;
    }).join('');
  }

  el.innerHTML = `
    <div class="stats-bar">
      <div><span class="stat-val">${n}</span><span class="stat-lab">Personnes</span></div>
      <div><span class="stat-val">${done}</span><span class="stat-lab">Comparaisons</span></div>
      <div><span class="stat-val">${total - done}</span><span class="stat-lab">Restantes</span></div>
      <div><span class="stat-val">${total > 0 ? Math.round(done/total*100) : 0}%</span><span class="stat-lab">Complété</span></div>
    </div>
    <div style="display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;font-size:11px;color:#6b6b80;">
      <span><span class="rel-badge rel-high">●●●</span> Fiable (&gt;50% comp.)</span>
      <span><span class="rel-badge rel-mid">●●○</span> Partiel (20-50%)</span>
      <span><span class="rel-badge rel-low">●○○</span> Insuffisant (&lt;20%)</span>
    </div>
    <div class="rank-grid">
      <div class="rank-card">
        <div class="rank-card-head">
          <span style="font-size:18px">🔥</span>
          <div><div class="rank-card-title" style="color:#e8a838">Envie</div><div class="rank-card-sub">Désirabilité relative</div></div>
        </div>${makeList(byEnvie, 'envie', '#e8a838')}
      </div>
      <div class="rank-card">
        <div class="rank-card-head">
          <span style="font-size:18px">📡</span>
          <div><div class="rank-card-title" style="color:#4ea8de">Probabilité</div><div class="rank-card-sub">Réalisme relatif</div></div>
        </div>${makeList(byProb, 'prob', '#4ea8de')}
      </div>
      <div class="rank-card">
        <div class="rank-card-head">
          <span style="font-size:18px">⚡</span>
          <div><div class="rank-card-title" style="color:#c77dff">Priorité</div><div class="rank-card-sub">Envie × Probabilité</div></div>
        </div>${makeList(byPri, 'pri', '#c77dff')}
      </div>
    </div>`;
}

// ======== MANAGE ========
let editingId = null;

function renderManage() {
  const el = document.getElementById('person-list');
  if (!state.people.length) { el.innerHTML = '<div style="padding:20px;color:#6b6b80;text-align:center">Aucune personne.</div>'; return; }

  el.innerHTML = `<div class="person-list-head"><span>${state.people.length} personnes</span><span>comp.</span></div>`;

  state.people.forEach(p => {
    const comps = state.scores[p.id] ? (state.scores[p.id].envie_count || 0) : 0;
    const row = document.createElement('div');
    row.className = 'person-row' + (editingId === p.id ? ' editing' : '');

    if (editingId === p.id) {
      const inp = document.createElement('input');
      inp.className = 'edit-input';
      inp.value = p.name;
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveName(p.id, inp.value); if (e.key === 'Escape') { editingId = null; renderManage(); } });
      const btnS = document.createElement('button');
      btnS.className = 'btn-save'; btnS.textContent = '✓';
      btnS.onclick = () => saveName(p.id, inp.value);
      const btnC = document.createElement('button');
      btnC.className = 'btn-cancel-sm'; btnC.textContent = '✕';
      btnC.onclick = () => { editingId = null; renderManage(); };
      row.appendChild(inp); row.appendChild(btnS); row.appendChild(btnC);
      el.appendChild(row);
      setTimeout(() => inp.focus(), 50);
    } else {
      const nameEl = document.createElement('span'); nameEl.className = 'person-name'; nameEl.textContent = p.name;
      const compEl = document.createElement('span'); compEl.className = 'person-comps'; compEl.textContent = comps + ' comp.';
      const btnE = document.createElement('button'); btnE.className = 'icon-btn'; btnE.textContent = '✎'; btnE.style.color = '#4ea8de';
      btnE.onclick = () => { editingId = p.id; renderManage(); };
      const btnD = document.createElement('button'); btnD.className = 'icon-btn'; btnD.textContent = '×'; btnD.style.color = '#ff6b6b';
      btnD.onclick = () => deletePerson(p.id);
      row.appendChild(nameEl); row.appendChild(compEl); row.appendChild(btnE); row.appendChild(btnD);
      el.appendChild(row);
    }
  });
}

function addPerson() {
  const inp = document.getElementById('new-name');
  const name = inp.value.trim();
  if (!name) return;
  if (state.people.some(p => p.name.toLowerCase() === name.toLowerCase())) { showFlash('Déjà dans la liste'); return; }
  state.people.push({ id: makeId(), name });
  saveData();
  inp.value = '';
  initSession();
  renderManage();
  showFlash('Ajouté : ' + name);
}

function saveName(id, newName) {
  newName = newName.trim();
  if (!newName) return;
  if (state.people.some(p => p.id !== id && p.name.toLowerCase() === newName.toLowerCase())) { showFlash('Ce nom existe déjà'); return; }
  const p = state.people.find(p => p.id === id);
  if (p) p.name = newName;
  saveData();
  editingId = null;
  renderManage();
  showFlash('Nom modifié');
}

function deletePerson(id) {
  if (!confirm('Supprimer cette personne et ses comparaisons ?')) return;
  state.people = state.people.filter(p => p.id !== id);
  delete state.scores[id];
  for (const key of Object.keys(state.comparisons)) {
    const parts = key.split('|');
    if (parts[0] === id || parts[1] === id) delete state.comparisons[key];
  }
  saveData();
  editingId = null;
  initSession();
  renderManage();
  showFlash('Supprimé');
}

function resetScores() {
  if (!confirm('Réinitialiser tous les scores ? Les noms sont conservés.')) return;
  state.scores = {};
  state.comparisons = {};
  saveData();
  initSession();
  renderManage();
  showFlash('Scores réinitialisés');
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'relations-backup-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showFlash('Exporté');
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.people || !Array.isArray(parsed.people)) throw new Error('Format invalide');
      if (!confirm('Remplacer les données actuelles par cette sauvegarde ?')) return;
      state = parsed;
      saveData();
      initSession();
      renderManage();
      showFlash('Importé — ' + state.people.length + ' personnes');
    } catch(err) { alert('Fichier invalide : ' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ======== INIT ========
initSession();
renderCompare();
renderManage();
</script>
</body>
